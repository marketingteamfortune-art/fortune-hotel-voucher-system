version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: hotel-voucher-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hotel-voucher-system
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: hotel-voucher-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hotel-voucher-system?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: hotel-voucher-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  mongo_data:
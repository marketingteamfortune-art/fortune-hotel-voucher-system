[build]
  base = "frontend"
  publish = "build"
  command = "npm install && npm run build"

[[redirects]]
  from = "/api/*"
  to = "https://fortune-hotel-voucher-system-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
